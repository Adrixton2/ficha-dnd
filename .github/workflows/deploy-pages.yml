name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Generar configuracion Firebase de produccion
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          node -e "const fs=require('fs'); const config=JSON.parse(process.env.FIREBASE_CONFIG_JSON); fs.writeFileSync('firebase-config.js', 'window.__FIREBASE_CONFIG__ = ' + JSON.stringify(config, null, 2) + ';\\n');"

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
