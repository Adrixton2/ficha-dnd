name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validar version publicable
        run: node scripts/verify-release.mjs

      - name: Probar utilidades puras
        run: node --test tests/pure-utils.test.mjs

      - name: Generar configuracion Firebase de produccion
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          node -e "const fs=require('fs'); const config=JSON.parse(process.env.FIREBASE_CONFIG_JSON); fs.writeFileSync('firebase-config.js', 'window.__FIREBASE_CONFIG__ = ' + JSON.stringify(config, null, 2) + ';\\n');"

      - name: Preparar artefacto de produccion
        run: |
          mkdir -p _site
          cp index.html styles.css online-table.css app.compiled.js online-table-components.compiled.js app-utils.js spell-library-srd51-es.js character-manager.js development-checks.js firebase-client.js firebase-config.js online-initiative-utils.js online-table-utils.js service-worker.js manifest.json icon-192.png icon-512.png _site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
